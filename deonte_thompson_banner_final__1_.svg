<svg width="680" viewBox="0 0 680 180" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Deonte Thompson GitHub Profile Banner</title>
  <desc>Neon blue tech banner for Deonte Thompson, PMP Certified Project Manager and Cloud Enthusiast</desc>

  <rect width="680" height="180" fill="#0a0e1a"/>

  <!-- Grid lines -->
  <line x1="0" y1="60" x2="680" y2="60" stroke="#60a5fa" stroke-opacity="0.07" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="680" y2="120" stroke="#60a5fa" stroke-opacity="0.07" stroke-width="0.5"/>
  <line x1="170" y1="0" x2="170" y2="180" stroke="#60a5fa" stroke-opacity="0.07" stroke-width="0.5"/>
  <line x1="340" y1="0" x2="340" y2="180" stroke="#60a5fa" stroke-opacity="0.07" stroke-width="0.5"/>
  <line x1="510" y1="0" x2="510" y2="180" stroke="#60a5fa" stroke-opacity="0.07" stroke-width="0.5"/>

  <!-- Top neon bar -->
  <rect x="0" y="0" width="680" height="3" fill="#60a5fa"/>
  <rect x="0" y="0" width="680" height="1" fill="#bfdbfe" opacity="0.9"/>

  <!-- Left accent bars -->
  <rect x="40" y="28" width="3" height="124" fill="#60a5fa" opacity="0.8"/>
  <rect x="48" y="48" width="3" height="84" fill="#60a5fa" opacity="0.35"/>

  <!-- Right dot matrix -->
  <circle cx="600" cy="50" r="2.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="618" cy="50" r="2.5" fill="#60a5fa" opacity="0.45"/>
  <circle cx="636" cy="50" r="2.5" fill="#60a5fa" opacity="0.22"/>
  <circle cx="600" cy="68" r="2.5" fill="#60a5fa" opacity="0.45"/>
  <circle cx="618" cy="68" r="2.5" fill="#60a5fa" opacity="0.22"/>
  <circle cx="600" cy="86" r="2.5" fill="#60a5fa" opacity="0.22"/>

  <!-- Corner brackets -->
  <polyline points="648,22 664,22 664,40" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="32,158 16,158 16,140" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Name -->
  <text x="62" y="86" font-family="Courier New, monospace" font-weight="700" font-size="42" fill="#e8f4ff" letter-spacing="0.5">Deonte Thompson</text>

  <!-- Neon underline -->
  <rect x="62" y="97" width="440" height="1.5" fill="#60a5fa"/>
  <rect x="62" y="98.5" width="440" height="0.5" fill="#bfdbfe" opacity="0.5"/>

  <!-- Role tagline -->
  <text x="64" y="118" font-family="Courier New, monospace" font-size="13" fill="#93c5fd" letter-spacing="1.2">Certified Project Manager  ·  Cloud Enthusiast</text>

  <!-- Credential pills: PMP, PSM, CCP only -->
  <rect x="64" y="133" width="36" height="19" rx="3" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.7" stroke-width="0.75"/>
  <text x="82" y="146" font-family="Courier New, monospace" font-size="10" fill="#93c5fd" text-anchor="middle">PMP</text>

  <rect x="106" y="133" width="36" height="19" rx="3" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.7" stroke-width="0.75"/>
  <text x="124" y="146" font-family="Courier New, monospace" font-size="10" fill="#93c5fd" text-anchor="middle">PSM I</text>

  <rect x="148" y="133" width="36" height="19" rx="3" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.7" stroke-width="0.75"/>
  <text x="166" y="146" font-family="Courier New, monospace" font-size="10" fill="#93c5fd" text-anchor="middle">CCP</text>

  <!-- Location -->
  <text x="638" y="146" font-family="Courier New, monospace" font-size="10" fill="#60a5fa" fill-opacity="0.55" text-anchor="end">Houston, TX</text>

  <!-- Bottom bar -->
  <rect x="0" y="176" width="680" height="4" fill="#60a5fa" opacity="0.35"/>
</svg>
